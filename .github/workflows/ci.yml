name: CI

on:
  push:
  pull_request:

jobs:
  build-x64:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build build-essential \
           qt6-base-dev qt6-svg-dev qt6-declarative-dev qt6-positioning-dev \
           libboost-all-dev \
           libcapnp-dev capnproto libglib2.0-dev libsecret-1-dev libconfig-dev

      - name: Locate ALL capnp outputs
        run: |
          echo "=== SEARCH ALL BUILD ==="
          find . -name "*.capnp*" -o -name "*gpio*" || true

          echo "=== SEARCH HEADER ==="
          find . -name "protocol.capnp.h" || true

      - name: Inspect generated Capnp
        run: |
          echo "FILES:"
          find ./generated -name "*.capnp*" -o -name "*.h"

          echo "SEARCH GPIO:"
          grep -R "GpioEventCapnp" -n ./generated || true

      - name: Build
        run: cmake --build build-x64

      - name: Package .deb
        run: |
          cd build-x64
          cpack -G DEB

      - name: Save generated capnp header
        run: |
          mkdir -p artifacts
          cp build-x64/debug/protocol.capnp.h artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-x64
          path: build-x64/*.deb


  build-armv7:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cross tools
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Configure
        run: |
          cmake -S . -B build-armhf \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-armv7.cmake \
            -DCMAKE_SYSROOT=$HOME/actions-runner/sysroot \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build-armhf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-armhf
          path: build-armhf/*.deb

